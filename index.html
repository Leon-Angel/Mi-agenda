<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0e17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Agenda">
<title>Mi Agenda</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17;
  --surface: #1a1828;
  --surface2: #221f33;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f2f0ff;
  --text2: rgba(242,240,255,0.55);
  --text3: rgba(242,240,255,0.3);
  --acad: #a89ff4;
  --acad-bg: rgba(168,159,244,0.12);
  --acad-border: rgba(168,159,244,0.25);
  --clin: #6dd5b0;
  --clin-bg: rgba(109,213,176,0.1);
  --clin-border: rgba(109,213,176,0.22);
  --crea: #f4a0c0;
  --crea-bg: rgba(244,160,192,0.1);
  --crea-border: rgba(244,160,192,0.22);
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.5; overscroll-behavior: none; }
#app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; position: relative; }

/* Header */
.header { padding: 52px 20px 16px; background: var(--bg); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
.header-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }
.app-title { font-size: 22px; font-weight: 500; letter-spacing: -0.3px; }
.app-title span { color: var(--acad); }
.today-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; }
.week-nav { display: flex; align-items: center; gap: 10px; }
.week-nav button { background: var(--surface); border: 1px solid var(--border2); border-radius: 50%; width: 32px; height: 32px; color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.week-nav button:active { opacity: 0.6; transform: scale(0.94); }
.week-range { font-size: 13px; color: var(--text2); flex: 1; text-align: center; }

/* Sub-header for list pages */
.sub-header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg); }
.back-btn { background: var(--surface); border: 1px solid var(--border2); border-radius: 50%; width: 32px; height: 32px; color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sub-header-title { font-size: 17px; font-weight: 500; }

/* Day strip */
.day-strip { display: flex; gap: 6px; overflow-x: auto; padding: 14px 20px 0; scrollbar-width: none; background: var(--bg); }
.day-strip::-webkit-scrollbar { display: none; }
.day-chip { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 44px; padding: 8px 0; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; transition: background 0.15s; }
.day-chip .day-name { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-family: 'DM Mono', monospace; }
.day-chip .day-num { font-size: 17px; font-weight: 500; color: var(--text2); }
.day-chip .day-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; }
.day-chip.has-tasks .day-dot { background: var(--acad); }
.day-chip.active { background: var(--surface2); border-color: var(--border2); }
.day-chip.active .day-num { color: var(--text); }
.day-chip.today .day-num { color: var(--acad); }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 16px 20px 100px; scrollbar-width: none; }
.content::-webkit-scrollbar { display: none; }

/* Stats row — now clickable */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
.stat-box { background: var(--surface); border-radius: var(--radius-sm); padding: 10px 10px 8px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s, transform 0.1s; user-select: none; }
.stat-box:active { transform: scale(0.95); }
.stat-box.acad:active, .stat-box.acad:hover { border-color: var(--acad-border); }
.stat-box.clin:active, .stat-box.clin:hover { border-color: var(--clin-border); }
.stat-box.crea:active, .stat-box.crea:hover { border-color: var(--crea-border); }
.stat-box .num { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }
.stat-box .lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
.stat-box .tap-hint { font-size: 9px; color: var(--text3); margin-top: 4px; letter-spacing: 0.3px; }
.stat-box.acad .num { color: var(--acad); }
.stat-box.clin .num { color: var(--clin); }
.stat-box.crea .num { color: var(--crea); }

/* Day header */
.day-label { font-size: 13px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }

/* Tasks */
.task-list { display: flex; flex-direction: column; gap: 8px; }
.task-card { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s; display: flex; align-items: flex-start; gap: 12px; }
.task-card:active { opacity: 0.75; transform: scale(0.98); }
.task-card.acad { border-left: 3px solid var(--acad); }
.task-card.clin { border-left: 3px solid var(--clin); }
.task-card.crea { border-left: 3px solid var(--crea); }
.task-card .task-body { flex: 1; min-width: 0; }
.task-card .task-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-card .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.task-card .task-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
.task-tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 500; letter-spacing: 0.3px; }
.task-tag.acad { background: var(--acad-bg); color: var(--acad); border: 1px solid var(--acad-border); }
.task-tag.clin { background: var(--clin-bg); color: var(--clin); border: 1px solid var(--clin-border); }
.task-tag.crea { background: var(--crea-bg); color: var(--crea); border: 1px solid var(--crea-border); }
.task-card .task-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; }
.task-card.done .task-title { text-decoration: line-through; color: var(--text3); }
.task-card.done .task-check { border-color: var(--acad); color: var(--acad); background: var(--acad-bg); }
.task-date-group { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.7px; margin: 16px 0 8px; }
.task-date-group:first-child { margin-top: 0; }

.empty-state { text-align: center; padding: 40px 20px; }
.empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; color: var(--text3); }

/* Upcoming alerts */
.upcoming-section { margin-bottom: 20px; }
.upcoming-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.upcoming-header .up-icon { font-size: 16px; }
.upcoming-header .up-title { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.8px; }
.upcoming-card { border-radius: var(--radius-sm); padding: 11px 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 6px; border: 1px solid; cursor: pointer; }
.upcoming-card.urgent { background: rgba(244,160,192,0.08); border-color: rgba(244,160,192,0.2); }
.upcoming-card.soon { background: rgba(168,159,244,0.08); border-color: rgba(168,159,244,0.18); }
.upcoming-card.coming { background: var(--surface); border-color: var(--border); }
.upcoming-card .up-days { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; min-width: 52px; text-align: center; padding: 3px 6px; border-radius: 6px; }
.upcoming-card.urgent .up-days { background: rgba(244,160,192,0.15); color: var(--crea); }
.upcoming-card.soon .up-days { background: rgba(168,159,244,0.15); color: var(--acad); }
.upcoming-card.coming .up-days { background: var(--surface2); color: var(--text3); }
.upcoming-card .up-body { flex: 1; min-width: 0; }
.upcoming-card .up-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.upcoming-card .up-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* FAB */
.fab { position: fixed; bottom: calc(60px + env(safe-area-inset-bottom) + 16px); right: 20px; width: 54px; height: 54px; border-radius: 50%; background: var(--acad); border: none; color: #0f0e17; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 300; box-shadow: 0 4px 24px rgba(168,159,244,0.35); z-index: 20; }
.fab:active { transform: scale(0.92); }

/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--bg); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 15; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 8px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; font-family: 'DM Sans', sans-serif; letter-spacing: 0.3px; text-transform: uppercase; transition: color 0.15s; }
.nav-item .nav-icon { font-size: 20px; }
.nav-item.active { color: var(--acad); }

/* Modal / sheet */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 430px; margin: 0 auto; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); transform: translateY(20px); transition: transform 0.25s; max-height: 92dvh; overflow-y: auto; }
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-size: 17px; font-weight: 500; margin-bottom: 20px; }

/* Form */
.form-field { margin-bottom: 16px; }
.form-field label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; font-family: 'DM Mono', monospace; display: block; margin-bottom: 8px; }
.form-field input, .form-field select, .form-field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; appearance: none; }
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--acad); }
.form-field textarea { min-height: 72px; resize: none; }
.form-field select option { background: var(--surface2); }
.cat-row { display: flex; gap: 8px; }
.cat-opt { flex: 1; padding: 10px 6px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; }
.cat-opt.sel-acad { background: var(--acad-bg); border-color: var(--acad); color: var(--acad); }
.cat-opt.sel-clin { background: var(--clin-bg); border-color: var(--clin); color: var(--clin); }
.cat-opt.sel-crea { background: var(--crea-bg); border-color: var(--crea); color: var(--crea); }
.materias-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
.materia-chip { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--acad-border); background: var(--acad-bg); color: var(--acad); font-size: 12px; cursor: pointer; transition: all 0.12s; }
.materia-chip.sel { background: var(--acad); color: #0f0e17; }
.materia-chip.add-new { border-style: dashed; background: transparent; color: var(--text3); border-color: var(--border2); }
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.save-btn { width: 100%; padding: 14px; border-radius: var(--radius); background: var(--acad); color: #0f0e17; font-size: 15px; font-weight: 500; border: none; cursor: pointer; margin-top: 8px; font-family: 'DM Sans', sans-serif; }
.save-btn:active { opacity: 0.75; }

/* Detail sheet */
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.detail-title { font-size: 20px; font-weight: 500; line-height: 1.3; flex: 1; }
.close-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; width: 30px; height: 30px; color: var(--text2); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 10px; }
.detail-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 14px; color: var(--text2); }
.detail-row .icon { font-size: 16px; }
.detail-note { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; color: var(--text2); line-height: 1.6; margin: 12px 0; }
.detail-actions { display: flex; gap: 8px; margin-top: 8px; }
.edit-btn { flex: 1; padding: 13px; border-radius: var(--radius); background: var(--acad-bg); border: 1px solid var(--acad-border); color: var(--acad); font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; }
.del-btn { flex: 1; padding: 13px; border-radius: var(--radius); background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); color: #ff7070; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

/* Materias page */
.page { display: none; flex-direction: column; height: 100%; }
.page.active { display: flex; }
.page-content { flex: 1; overflow-y: auto; padding: 16px 20px 100px; }
.section-title { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; margin-top: 20px; }
.section-title:first-child { margin-top: 0; }
.materia-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.materia-row .m-name { font-size: 14px; font-weight: 500; }
.materia-row .m-del { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 0 4px; }
.add-materia-btn { width: 100%; padding: 12px; border-radius: var(--radius-sm); background: transparent; border: 1px dashed var(--border2); color: var(--text3); font-size: 13px; cursor: pointer; margin-top: 8px; font-family: 'DM Sans', sans-serif; }
</style>
</head>
<body>
<div id="app">

  <!-- PAGE: AGENDA -->
  <div class="page active" id="page-agenda">
    <div class="header">
      <div class="header-top">
        <div class="app-title">mi <span>agenda</span></div>
        <div class="today-badge" id="today-badge"></div>
      </div>
      <div class="week-nav">
        <button onclick="changeWeek(-1)">‹</button>
        <span class="week-range" id="week-range"></span>
        <button onclick="changeWeek(1)">›</button>
      </div>
    </div>
    <div class="day-strip" id="day-strip"></div>
    <div class="content" id="main-content"></div>
  </div>

  <!-- PAGE: CATEGORY LIST -->
  <div class="page" id="page-catlist">
    <div class="header" style="padding-top:52px;padding-bottom:0">
      <div class="sub-header" style="padding:0 0 16px">
        <button class="back-btn" onclick="goPage('agenda')">‹</button>
        <div class="sub-header-title" id="catlist-title"></div>
      </div>
    </div>
    <div class="content" id="catlist-content"></div>
  </div>

  <!-- PAGE: MATERIAS -->
  <div class="page" id="page-materias">
    <div class="header" style="padding-top:52px">
      <div class="header-top"><div class="app-title">materias</div></div>
    </div>
    <div class="page-content" id="materias-content"></div>
  </div>

  <!-- PAGE: STATS -->
  <div class="page" id="page-stats">
    <div class="header" style="padding-top:52px">
      <div class="header-top"><div class="app-title">resumen</div></div>
    </div>
    <div class="page-content" id="stats-content"></div>
  </div>

  <!-- FAB -->
  <button class="fab" onclick="openAdd()" aria-label="Agregar actividad">+</button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-agenda" onclick="goPage('agenda')">
      <span class="nav-icon">📅</span>Agenda
    </button>
    <button class="nav-item" id="nav-materias" onclick="goPage('materias')">
      <span class="nav-icon">📚</span>Materias
    </button>
    <button class="nav-item" id="nav-stats" onclick="goPage('stats')">
      <span class="nav-icon">📊</span>Resumen
    </button>
  </nav>

  <!-- ADD / EDIT MODAL -->
  <div class="modal-overlay" id="add-modal" onclick="closeAddOnBg(event)">
    <div class="modal-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="add-modal-title">Nueva actividad</div>
      <div class="form-field">
        <label>Título</label>
        <input type="text" id="f-title" placeholder="Ej: Entrega infografía">
      </div>
      <div class="form-field">
        <label>Categoría</label>
        <div class="cat-row">
          <button class="cat-opt" id="opt-acad" onclick="selCat('acad')">Académico</button>
          <button class="cat-opt" id="opt-clin" onclick="selCat('clin')">Clínico</button>
          <button class="cat-opt" id="opt-crea" onclick="selCat('crea')">Creativo</button>
        </div>
      </div>
      <div class="form-field" id="materia-field" style="display:none">
        <label>Materia</label>
        <div class="materias-wrap" id="materia-chips"></div>
      </div>
      <div class="form-field">
        <label>Fecha</label>
        <input type="date" id="f-date">
      </div>
      <div class="time-row">
        <div class="form-field">
          <label>Hora inicio</label>
          <input type="time" id="f-start">
        </div>
        <div class="form-field">
          <label>Hora fin</label>
          <input type="time" id="f-end">
        </div>
      </div>
      <div class="form-field">
        <label>Notas (opcional)</label>
        <textarea id="f-note" placeholder="Detalles, prioridad, materiales..."></textarea>
      </div>
      <button class="save-btn" onclick="saveTask()">Guardar</button>
    </div>
  </div>

  <!-- DETAIL MODAL -->
  <div class="modal-overlay" id="detail-modal" onclick="closeDetailOnBg(event)">
    <div class="modal-sheet">
      <div class="sheet-handle"></div>
      <div class="detail-header">
        <div class="detail-title" id="d-title"></div>
        <button class="close-btn" onclick="closeDetail()">×</button>
      </div>
      <div id="d-tag-row" style="margin-bottom:14px"></div>
      <div class="detail-row"><span class="icon">📅</span><span id="d-date"></span></div>
      <div class="detail-row" id="d-time-row" style="display:none"><span class="icon">🕐</span><span id="d-time"></span></div>
      <div class="detail-row" id="d-materia-row" style="display:none"><span class="icon">📚</span><span id="d-materia"></span></div>
      <div id="d-note-wrap" style="display:none"><div class="detail-note" id="d-note"></div></div>
      <div class="detail-actions">
        <button class="edit-btn" onclick="openEdit()">✏️ Editar</button>
        <button class="del-btn" onclick="deleteTask()">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- ADD MATERIA MODAL -->
  <div class="modal-overlay" id="materia-modal" onclick="closeMatModal(event)">
    <div class="modal-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Nueva materia</div>
      <div class="form-field">
        <label>Nombre</label>
        <input type="text" id="m-name" placeholder="Ej: Neuropsicología">
      </div>
      <button class="save-btn" onclick="saveMateria()">Agregar</button>
    </div>
  </div>

</div>

<script>
const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DAYS_FULL = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

let state = load();
let weekOffset = 0;
let activeDayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
let selCatVal = '';
let selMateriaVal = '';
let detailId = null;
let editingId = null;
let currentPage = 'agenda';
let currentCatFilter = null;

function load() {
  try {
    const s = localStorage.getItem('agenda_v2');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { tasks: [], materias: ['Neuropsicología','Estadística','Psicología Clínica','Desarrollo Humano'] };
}
function save() { localStorage.setItem('agenda_v2', JSON.stringify(state)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function dateKey(d) { return d.toISOString().slice(0,10); }

function getWeekStart(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function goPage(p) {
  currentPage = p;
  ['agenda','catlist','materias','stats'].forEach(x => {
    document.getElementById('page-'+x).classList.toggle('active', x===p);
  });
  ['agenda','materias','stats'].forEach(x => {
    document.getElementById('nav-'+x).classList.toggle('active', x===p);
  });
  if (p === 'materias') renderMaterias();
  if (p === 'stats') renderStats();
}

function openCatList(cat) {
  currentCatFilter = cat;
  const labels = {acad:'Académico',clin:'Clínico',crea:'Creativo'};
  const icons = {acad:'📚',clin:'🩺',crea:'🎙'};
  document.getElementById('catlist-title').textContent = icons[cat] + ' ' + labels[cat];
  renderCatList();
  goPage('catlist');
}

// === AGENDA ===
function renderAgenda() {
  const ws = getWeekStart(weekOffset);
  const we = new Date(ws); we.setDate(ws.getDate()+6);
  document.getElementById('week-range').textContent =
    ws.getDate() + ' ' + MONTHS[ws.getMonth()].slice(0,3) + ' – ' +
    we.getDate() + ' ' + MONTHS[we.getMonth()].slice(0,3);

  const today = new Date();
  const todayKey = dateKey(today);
  document.getElementById('today-badge').textContent =
    DAYS_FULL[today.getDay()] + ', ' + today.getDate() + ' de ' + MONTHS[today.getMonth()];

  // day strip
  const strip = document.getElementById('day-strip');
  strip.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate()+i);
    const dKey = dateKey(d);
    const hasTasks = state.tasks.some(t => t.date === dKey);
    const chip = document.createElement('div');
    chip.className = 'day-chip' + (i===activeDayIdx?' active':'') + (dKey===todayKey?' today':'') + (hasTasks?' has-tasks':'');
    chip.innerHTML = `<span class="day-name">${DAYS_ES[d.getDay()]}</span><span class="day-num">${d.getDate()}</span><span class="day-dot"></span>`;
    const idx = i;
    chip.onclick = () => { activeDayIdx = idx; renderAgenda(); };
    strip.appendChild(chip);
  }

  const activeDate = new Date(ws); activeDate.setDate(ws.getDate() + activeDayIdx);
  const activeDKey = dateKey(activeDate);
  const dayTasks = state.tasks.filter(t => t.date === activeDKey).sort((a,b) => (a.start||'99:99').localeCompare(b.start||'99:99'));

  const content = document.getElementById('main-content');
  content.innerHTML = '';

  // stats — clickable
  const counts = {acad:0,clin:0,crea:0};
  const ws2 = getWeekStart(weekOffset);
  const we2 = new Date(ws2); we2.setDate(ws2.getDate()+6);
  state.tasks.forEach(t => {
    const td = new Date(t.date+'T12:00');
    if (td >= ws2 && td <= we2 && counts[t.cat]!==undefined) counts[t.cat]++;
  });

  const statsEl = document.createElement('div');
  statsEl.className = 'stats-row';
  ['acad','clin','crea'].forEach(cat => {
    const labels = {acad:'Académico',clin:'Clínico',crea:'Creativo'};
    const box = document.createElement('div');
    box.className = `stat-box ${cat}`;
    box.innerHTML = `<div class="num">${counts[cat]}</div><div class="lbl">${labels[cat]}</div><div class="tap-hint">ver todas →</div>`;
    box.onclick = () => openCatList(cat);
    statsEl.appendChild(box);
  });
  content.appendChild(statsEl);

  // upcoming
  renderUpcoming(content);

  // day tasks
  const lbl = document.createElement('div');
  lbl.className = 'day-label';
  lbl.textContent = DAYS_FULL[activeDate.getDay()] + ' ' + activeDate.getDate() + ' de ' + MONTHS[activeDate.getMonth()];
  content.appendChild(lbl);

  if (dayTasks.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<div class="empty-icon">🌙</div><p>Sin actividades para este día</p>';
    content.appendChild(empty);
    return;
  }

  const list = document.createElement('div');
  list.className = 'task-list';
  dayTasks.forEach(t => {
    list.appendChild(makeTaskCard(t));
  });
  content.appendChild(list);
}

function makeTaskCard(t) {
  const card = document.createElement('div');
  card.className = `task-card ${t.cat}${t.done?' done':''}`;
  const timeStr = t.start ? (t.end ? `${t.start} – ${t.end}` : t.start) : '';
  const subLabel = t.cat === 'acad' && t.materia ? t.materia : {acad:'Académico',clin:'Clínico',crea:'Creativo'}[t.cat];
  card.innerHTML = `
    <button class="task-check" onclick="toggleDone('${t.id}',event)">${t.done?'✓':''}</button>
    <div class="task-body">
      <div class="task-title">${t.title}</div>
      <div class="task-meta">
        ${timeStr ? `<span class="task-time">${timeStr}</span>` : ''}
        <span class="task-tag ${t.cat}">${subLabel}</span>
      </div>
    </div>
  `;
  card.onclick = () => openDetail(t.id);
  return card;
}

function changeWeek(dir) { weekOffset += dir; renderAgenda(); }

function toggleDone(id, e) {
  e.stopPropagation();
  const t = state.tasks.find(x => x.id===id);
  if (t) { t.done = !t.done; save(); renderAgenda(); if (currentPage==='catlist') renderCatList(); }
}

// === UPCOMING ===
function renderUpcoming(content) {
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = state.tasks
    .filter(t => {
      if (t.done) return false;
      const td = new Date(t.date+'T12:00'); td.setHours(0,0,0,0);
      const diff = Math.round((td - today) / 86400000);
      return diff >= 0 && diff <= 7;
    })
    .map(t => {
      const td = new Date(t.date+'T12:00'); td.setHours(0,0,0,0);
      return { ...t, diff: Math.round((td - today) / 86400000) };
    })
    .sort((a,b) => a.diff - b.diff);

  if (upcoming.length === 0) return;

  const section = document.createElement('div');
  section.className = 'upcoming-section';
  section.innerHTML = `<div class="upcoming-header"><span class="up-icon">⚡</span><span class="up-title">Próximas entregas</span></div>`;

  upcoming.forEach(t => {
    const urgency = t.diff <= 2 ? 'urgent' : t.diff <= 4 ? 'soon' : 'coming';
    const dayLabel = t.diff===0 ? 'hoy' : t.diff===1 ? 'mañana' : `en ${t.diff} días`;
    const subLabel = t.cat==='acad' && t.materia ? t.materia : {acad:'Académico',clin:'Clínico',crea:'Creativo'}[t.cat];
    const card = document.createElement('div');
    card.className = `upcoming-card ${urgency}`;
    card.innerHTML = `
      <div class="up-days">${dayLabel}</div>
      <div class="up-body"><div class="up-name">${t.title}</div><div class="up-sub">${subLabel}</div></div>
      <span class="task-tag ${t.cat}" style="flex-shrink:0">${t.cat==='acad'?'📚':t.cat==='clin'?'🩺':'🎙'}</span>
    `;
    card.onclick = () => openDetail(t.id);
    section.appendChild(card);
  });

  content.insertBefore(section, content.firstChild);
}

// === CATEGORY LIST ===
function renderCatList() {
  const el = document.getElementById('catlist-content');
  el.innerHTML = '';
  const cat = currentCatFilter;

  const tasks = state.tasks
    .filter(t => t.cat === cat)
    .sort((a,b) => a.date.localeCompare(b.date) || (a.start||'').localeCompare(b.start||''));

  if (tasks.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🌿</div><p>Sin actividades en esta categoría</p></div>';
    return;
  }

  // Group by month
  const groups = {};
  tasks.forEach(t => {
    const d = new Date(t.date+'T12:00');
    const key = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  const list = document.createElement('div');
  list.className = 'task-list';
  Object.entries(groups).forEach(([month, ts]) => {
    const grpLbl = document.createElement('div');
    grpLbl.className = 'task-date-group';
    grpLbl.textContent = month;
    list.appendChild(grpLbl);
    ts.forEach(t => list.appendChild(makeTaskCard(t)));
  });
  el.appendChild(list);
}

// === ADD / EDIT ===
function openAdd() {
  editingId = null;
  selCatVal = '';
  selMateriaVal = '';
  document.getElementById('add-modal-title').textContent = 'Nueva actividad';
  document.getElementById('f-title').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-start').value = '';
  document.getElementById('f-end').value = '';
  ['acad','clin','crea'].forEach(c => document.getElementById('opt-'+c).className = 'cat-opt');
  document.getElementById('materia-field').style.display = 'none';
  const ws = getWeekStart(weekOffset);
  const activeDate = new Date(ws); activeDate.setDate(ws.getDate() + activeDayIdx);
  document.getElementById('f-date').value = dateKey(activeDate);
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 300);
}

function openEdit() {
  const t = state.tasks.find(x => x.id === detailId);
  if (!t) return;
  editingId = t.id;
  closeDetail();
  document.getElementById('add-modal-title').textContent = 'Editar actividad';
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-date').value = t.date;
  document.getElementById('f-start').value = t.start || '';
  document.getElementById('f-end').value = t.end || '';
  document.getElementById('f-note').value = t.note || '';
  selCatVal = t.cat;
  selMateriaVal = t.materia || '';
  ['acad','clin','crea'].forEach(c => document.getElementById('opt-'+c).className = 'cat-opt' + (c===t.cat?' sel-'+c:''));
  if (t.cat === 'acad') {
    document.getElementById('materia-field').style.display = '';
    renderMateriaChips();
  } else {
    document.getElementById('materia-field').style.display = 'none';
  }
  document.getElementById('add-modal').classList.add('open');
}

function closeAdd() { document.getElementById('add-modal').classList.remove('open'); editingId = null; }
function closeAddOnBg(e) { if (e.target.id==='add-modal') closeAdd(); }

function selCat(c) {
  selCatVal = c;
  selMateriaVal = '';
  ['acad','clin','crea'].forEach(x => document.getElementById('opt-'+x).className = 'cat-opt' + (x===c?' sel-'+x:''));
  if (c==='acad') { document.getElementById('materia-field').style.display=''; renderMateriaChips(); }
  else { document.getElementById('materia-field').style.display='none'; }
}

function renderMateriaChips() {
  const wrap = document.getElementById('materia-chips');
  wrap.innerHTML = '';
  state.materias.forEach(m => {
    const chip = document.createElement('button');
    chip.className = 'materia-chip' + (m===selMateriaVal?' sel':'');
    chip.textContent = m;
    chip.onclick = () => { selMateriaVal = m; renderMateriaChips(); };
    wrap.appendChild(chip);
  });
  const add = document.createElement('button');
  add.className = 'materia-chip add-new';
  add.textContent = '+ nueva';
  add.onclick = () => { closeAdd(); openMatModal(true); };
  wrap.appendChild(add);
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  if (!selCatVal) return;

  if (editingId) {
    const t = state.tasks.find(x => x.id===editingId);
    if (t) {
      t.title = title;
      t.cat = selCatVal;
      t.date = document.getElementById('f-date').value;
      t.start = document.getElementById('f-start').value;
      t.end = document.getElementById('f-end').value;
      t.note = document.getElementById('f-note').value.trim();
      t.materia = selCatVal==='acad' ? selMateriaVal : '';
    }
  } else {
    state.tasks.push({
      id: uid(), title, cat: selCatVal,
      date: document.getElementById('f-date').value,
      start: document.getElementById('f-start').value,
      end: document.getElementById('f-end').value,
      note: document.getElementById('f-note').value.trim(),
      materia: selCatVal==='acad' ? selMateriaVal : '',
      done: false, created: Date.now()
    });
  }
  save();
  closeAdd();
  renderAgenda();
  if (currentPage==='catlist') renderCatList();
}

// === DETAIL ===
function openDetail(id) {
  detailId = id;
  const t = state.tasks.find(x => x.id===id);
  if (!t) return;
  document.getElementById('d-title').textContent = t.title;
  const d = new Date(t.date+'T12:00');
  document.getElementById('d-date').textContent = DAYS_FULL[d.getDay()] + ', ' + d.getDate() + ' de ' + MONTHS[d.getMonth()];
  const catLabel = {acad:'Académico',clin:'Clínico',crea:'Creativo'}[t.cat];
  document.getElementById('d-tag-row').innerHTML = `<span class="task-tag ${t.cat}">${catLabel}</span>`;
  const tr = document.getElementById('d-time-row');
  if (t.start) { tr.style.display='flex'; document.getElementById('d-time').textContent = t.end ? `${t.start} – ${t.end}` : t.start; }
  else { tr.style.display='none'; }
  const mr = document.getElementById('d-materia-row');
  if (t.materia) { mr.style.display='flex'; document.getElementById('d-materia').textContent = t.materia; }
  else { mr.style.display='none'; }
  const nw = document.getElementById('d-note-wrap');
  if (t.note) { nw.style.display=''; document.getElementById('d-note').textContent = t.note; }
  else { nw.style.display='none'; }
  document.getElementById('detail-modal').classList.add('open');
}

function closeDetail() { document.getElementById('detail-modal').classList.remove('open'); }
function closeDetailOnBg(e) { if (e.target.id==='detail-modal') closeDetail(); }

function deleteTask() {
  state.tasks = state.tasks.filter(t => t.id!==detailId);
  save(); closeDetail(); renderAgenda();
  if (currentPage==='catlist') renderCatList();
}

// === MATERIAS ===
function openMatModal(fromAdd) {
  document.getElementById('m-name').value = '';
  document.getElementById('materia-modal').classList.add('open');
  document.getElementById('materia-modal').dataset.fromAdd = fromAdd ? '1' : '';
  setTimeout(() => document.getElementById('m-name').focus(), 300);
}
function closeMatModal(e) {
  if (e.type==='click' && e.target.id!=='materia-modal') return;
  document.getElementById('materia-modal').classList.remove('open');
}
function saveMateria() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) return;
  if (!state.materias.includes(name)) { state.materias.push(name); save(); }
  document.getElementById('materia-modal').classList.remove('open');
  if (document.getElementById('materia-modal').dataset.fromAdd==='1') {
    selMateriaVal = name;
    document.getElementById('add-modal').classList.add('open');
    selCat('acad');
  } else { renderMaterias(); }
}
function renderMaterias() {
  const el = document.getElementById('materias-content');
  el.innerHTML = '';
  const lbl = document.createElement('div');
  lbl.className = 'section-title'; lbl.textContent = 'Mis materias';
  el.appendChild(lbl);
  state.materias.forEach((m, i) => {
    const row = document.createElement('div');
    row.className = 'materia-row';
    const cnt = state.tasks.filter(t => t.materia===m).length;
    row.innerHTML = `<div><div class="m-name">${m}</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${cnt} actividad${cnt!==1?'es':''}</div></div><button class="m-del" onclick="deleteMateria(${i})">×</button>`;
    el.appendChild(row);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-materia-btn';
  addBtn.textContent = '+ Agregar materia';
  addBtn.onclick = () => openMatModal(false);
  el.appendChild(addBtn);
}
function deleteMateria(idx) { state.materias.splice(idx,1); save(); renderMaterias(); }

// === STATS ===
function renderStats() {
  const el = document.getElementById('stats-content');
  const total = state.tasks.length;
  const done = state.tasks.filter(t=>t.done).length;
  const counts = {acad:0,clin:0,crea:0};
  state.tasks.forEach(t => { if(counts[t.cat]!==undefined) counts[t.cat]++; });
  el.innerHTML = `
    <div class="section-title">Total acumulado</div>
    <div class="stats-row">
      <div class="stat-box acad" onclick="openCatList('acad')"><div class="num">${counts.acad}</div><div class="lbl">Académico</div></div>
      <div class="stat-box clin" onclick="openCatList('clin')"><div class="num">${counts.clin}</div><div class="lbl">Clínico</div></div>
      <div class="stat-box crea" onclick="openCatList('crea')"><div class="num">${counts.crea}</div><div class="lbl">Creativo</div></div>
    </div>
    <div class="section-title" style="margin-top:20px">Progreso</div>
    <div style="background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border);margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:13px;color:var(--text2)">Completadas</span>
        <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--acad)">${done} / ${total}</span>
      </div>
      <div style="background:var(--border2);border-radius:4px;height:6px;overflow:hidden">
        <div style="background:var(--acad);height:100%;width:${total>0?Math.round(done/total*100):0}%;border-radius:4px"></div>
      </div>
    </div>
    ${state.materias.length>0 ? `
    <div class="section-title" style="margin-top:20px">Por materia</div>
    ${state.materias.map(m => {
      const cnt = state.tasks.filter(t=>t.materia===m).length;
      const dCnt = state.tasks.filter(t=>t.materia===m&&t.done).length;
      return `<div style="background:var(--surface);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--border);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:14px">${m}</span>
        <span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text3)">${dCnt}/${cnt}</span>
      </div>`;
    }).join('')}` : ''}
  `;
}

// Init
renderAgenda();

// Service Worker
if ('serviceWorker' in navigator) {
  const swCode = `
self.addEventListener('install', e => e.waitUntil(caches.open('agenda-v1').then(c => c.addAll(['./', './index.html', './manifest.json']))));
self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
