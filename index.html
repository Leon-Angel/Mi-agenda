<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0e17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Agenda">
<title>Mi Agenda</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17; --surface: #1a1828; --surface2: #221f33;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #f2f0ff; --text2: rgba(242,240,255,0.65); --text3: rgba(242,240,255,0.45);
  --lila: #a89ff4;
  --radius: 14px; --radius-sm: 8px;
}
.light {
  --bg: #e8e6f0; --surface: #d8d5e8; --surface2: #cbc8dc;
  --border: rgba(80,70,120,0.1); --border2: rgba(80,70,120,0.18);
  --text: #1e1a2e; --text2: rgba(30,26,46,0.65); --text3: rgba(30,26,46,0.45);
}
/* Notes page */
.notes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.note-card { border-radius: var(--radius); padding: 14px; cursor: pointer; min-height: 110px; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.12s; }
.note-card:active { transform: scale(0.97); }
.note-card .n-title { font-size: 13px; font-weight: 500; color: #1e1a2e; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-card .n-body { font-size: 12px; color: rgba(30,26,46,0.7); line-height: 1.4; flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
.note-card .n-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.note-card .n-tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: rgba(0,0,0,0.1); color: rgba(30,26,46,0.6); font-weight: 500; }
.note-card .n-date { font-size: 10px; color: rgba(30,26,46,0.4); font-family: 'DM Mono', monospace; }
.note-fab { position: fixed; bottom: calc(60px + env(safe-area-inset-bottom) + 16px); right: 20px; width: 54px; height: 54px; border-radius: 50%; background: var(--lila); border: none; color: #0f0e17; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(168,159,244,0.35); z-index: 20; }
.note-fab:active { transform: scale(0.92); }
/* Note color swatches */
.note-colors { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
.note-color-sw { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.12s; }
.note-color-sw.sel { border-color: var(--text); transform: scale(1.15); }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.5; overscroll-behavior: none; }
#app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; position: relative; }

/* Header */
.header { padding: 52px 20px 16px; background: var(--bg); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
.header-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }
.app-title { font-size: 22px; font-weight: 500; letter-spacing: -0.3px; }
.app-title .title-lila { color: var(--lila); }
.today-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; }
.week-nav { display: flex; align-items: center; gap: 10px; }
.week-nav button { background: var(--surface); border: 1px solid var(--border2); border-radius: 50%; width: 32px; height: 32px; color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.week-nav button:active { opacity: 0.6; transform: scale(0.94); }
.week-range { font-size: 13px; color: var(--text2); flex: 1; text-align: center; }
.header-btns { display: flex; align-items: center; gap: 6px; }
.icon-btn { background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 4px 10px; font-size: 13px; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.icon-btn:active { opacity: 0.7; }

.sub-header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg); }
.back-btn { background: var(--surface); border: 1px solid var(--border2); border-radius: 50%; width: 32px; height: 32px; color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sub-header-title { font-size: 17px; font-weight: 500; }

.day-strip { display: flex; gap: 6px; overflow-x: auto; padding: 14px 20px 0; scrollbar-width: none; background: var(--bg); }
.day-strip::-webkit-scrollbar { display: none; }
.day-chip { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 44px; padding: 8px 0; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; }
.day-chip .day-name { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-family: 'DM Mono', monospace; }
.day-chip .day-num { font-size: 17px; font-weight: 500; color: var(--text2); }
.day-chip .day-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; }
.day-chip.has-tasks .day-dot { background: var(--text3); }
.day-chip.active { background: var(--surface2); border-color: var(--border2); }
.day-chip.active .day-num { color: var(--text); }
.day-chip.today .day-num { color: var(--text); font-weight: 700; }

.content { flex: 1; overflow-y: auto; padding: 16px 20px 100px; scrollbar-width: none; }
.content::-webkit-scrollbar { display: none; }

.stats-row { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.stats-row::-webkit-scrollbar { display: none; }
.stat-box { background: var(--surface); border-radius: var(--radius-sm); padding: 10px 12px 8px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s, transform 0.1s; user-select: none; flex-shrink: 0; min-width: 90px; }
.stat-box:active { transform: scale(0.95); }
.stat-box .num { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }
.stat-box .lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
.stat-box .tap-hint { font-size: 9px; color: var(--text3); margin-top: 4px; }

.day-label { font-size: 13px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }

.task-list { display: flex; flex-direction: column; gap: 8px; }
.task-card { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
.task-card:active { opacity: 0.75; transform: scale(0.98); }
.task-card .task-body { flex: 1; min-width: 0; }
.task-card .task-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-card .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.task-card .task-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
.task-tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 500; letter-spacing: 0.3px; border: 1px solid; }
.task-card .task-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; background: none; color: transparent; }
.task-card.done .task-title { text-decoration: line-through; color: var(--text3); }
.task-date-group { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.7px; margin: 16px 0 8px; }
.task-date-group:first-child { margin-top: 0; }
/* alert badge on task card */
.alert-badge { font-size: 10px; padding: 2px 6px; border-radius: 20px; background: rgba(168,159,244,0.15); color: var(--lila); border: 1px solid rgba(168,159,244,0.3); display: inline-flex; align-items: center; gap: 3px; }

.empty-state { text-align: center; padding: 40px 20px; }
.empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; color: var(--text3); }

.upcoming-section { margin-bottom: 20px; }
.upcoming-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.upcoming-header .up-title { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.8px; }
.upcoming-card { border-radius: var(--radius-sm); padding: 11px 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 6px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; }
.upcoming-card.urgent { background: rgba(244,160,192,0.06); border-color: rgba(244,160,192,0.18); }
.upcoming-card.soon { background: rgba(168,159,244,0.06); border-color: rgba(168,159,244,0.16); }
.upcoming-card .up-days { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; min-width: 52px; text-align: center; padding: 3px 6px; border-radius: 6px; background: var(--surface2); color: var(--text3); }
.upcoming-card.urgent .up-days { background: rgba(244,160,192,0.15); color: #f4a0c0; }
.upcoming-card.soon .up-days { background: rgba(168,159,244,0.15); color: #a89ff4; }
.upcoming-card .up-body { flex: 1; min-width: 0; }
.upcoming-card .up-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.upcoming-card .up-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.up-check { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border2); background: none; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--text3); }
.up-check:active { transform: scale(0.88); }

/* FAB */
.fab { position: fixed; bottom: calc(60px + env(safe-area-inset-bottom) + 16px); right: 20px; width: 54px; height: 54px; border-radius: 50%; background: var(--text); border: none; color: var(--bg); font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 300; box-shadow: 0 4px 24px rgba(0,0,0,0.3); z-index: 20; }
.fab:active { transform: scale(0.92); }

/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--bg); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 15; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 8px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; font-family: 'DM Sans', sans-serif; letter-spacing: 0.3px; text-transform: uppercase; }
.nav-item .nav-icon { font-size: 20px; }
.nav-item.active { color: var(--text); }

/* Firma */
.firma { position: fixed; bottom: calc(60px + env(safe-area-inset-bottom) + 6px); left: 16px; z-index: 19; line-height: 1.1; pointer-events: none; }
.firma-by { font-size: 9px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 1px; }
.firma-leon { font-size: 13px; font-weight: 500; color: var(--text2); letter-spacing: -0.2px; display: block; }
.firma-angel { font-size: 13px; font-style: italic; color: var(--lila); font-family: 'Playfair Display', serif; display: block; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 430px; margin: 0 auto; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); transform: translateY(20px); transition: transform 0.25s; max-height: 92dvh; overflow-y: auto; }
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-size: 17px; font-weight: 500; margin-bottom: 20px; }

/* Form */
.form-field { margin-bottom: 16px; }
.form-field label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; font-family: 'DM Mono', monospace; display: block; margin-bottom: 8px; }
.form-field input, .form-field select, .form-field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; appearance: none; }
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--text2); }
.form-field textarea { min-height: 72px; resize: none; }
.form-field select option { background: var(--surface2); }
.cat-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.cat-chip-opt { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 13px; cursor: pointer; }
.cat-chip-opt.selected { font-weight: 500; }
.materias-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
.materia-chip { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; }
.materia-chip.sel { background: var(--text); color: var(--bg); border-color: var(--text); }
.materia-chip.add-new { border-style: dashed; background: transparent; color: var(--text3); }
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.save-btn { width: 100%; padding: 14px; border-radius: var(--radius); background: var(--text); color: var(--bg); font-size: 15px; font-weight: 500; border: none; cursor: pointer; margin-top: 8px; font-family: 'DM Sans', sans-serif; }
.save-btn:active { opacity: 0.75; }
/* alert toggle inside form */
.alert-toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 4px; }
.alert-toggle-row .at-label { font-size: 14px; color: var(--text2); }
.toggle-sw { width: 44px; height: 24px; border-radius: 12px; background: var(--border2); position: relative; cursor: pointer; border: none; transition: background 0.2s; flex-shrink: 0; }
.toggle-sw.on { background: var(--lila); }
.toggle-sw::after { content:''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: white; top: 3px; left: 3px; transition: left 0.2s; }
.toggle-sw.on::after { left: 23px; }
.alert-time-field { margin-top: 10px; }
/* Repeat */
.repeat-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.repeat-chip { padding: 8px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; }
.repeat-chip.sel { background: var(--lila); color: #0f0e17; border-color: var(--lila); font-weight: 500; }
.weekday-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.weekday-opt { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; }
.weekday-opt.sel { background: var(--lila); color: #0f0e17; border-color: var(--lila); font-weight: 500; }
.repeat-end-row { margin-top: 12px; }
.repeat-end-opts { display: flex; gap: 8px; margin-bottom: 10px; }
.repeat-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: rgba(168,159,244,0.12); color: var(--lila); border: 1px solid rgba(168,159,244,0.25); display: inline-flex; align-items: center; gap: 3px; }

/* Detail */
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.detail-title { font-size: 20px; font-weight: 500; line-height: 1.3; flex: 1; }
.close-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; width: 30px; height: 30px; color: var(--text2); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 10px; }
.detail-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 14px; color: var(--text2); }
.detail-note { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; color: var(--text2); line-height: 1.6; margin: 12px 0; }
.detail-actions { display: flex; gap: 8px; margin-top: 8px; }
.edit-btn { flex: 1; padding: 13px; border-radius: var(--radius); background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; }
.del-btn { flex: 1; padding: 13px; border-radius: var(--radius); background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); color: #ff7070; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

/* Cats page */
.page { display: none; flex-direction: column; height: 100%; }
.page.active { display: flex; }
.page-content { flex: 1; overflow-y: auto; padding: 16px 20px 100px; }
.section-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; margin-top: 20px; }
.section-label:first-child { margin-top: 0; }
.list-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.list-row .r-main { flex: 1; min-width: 0; }
.list-row .r-name { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.list-row .r-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.list-row .r-del { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
.list-row .r-edit { background: none; border: none; color: var(--text3); font-size: 14px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
.add-row-btn { width: 100%; padding: 12px; border-radius: var(--radius-sm); background: transparent; border: 1px dashed var(--border2); color: var(--text3); font-size: 13px; cursor: pointer; margin-top: 8px; font-family: 'DM Sans', sans-serif; }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.color-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
.color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.12s; }
.color-swatch.sel { border-color: var(--text); transform: scale(1.15); }
.emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.emoji-opt { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.emoji-opt.sel { border-color: var(--text2); background: var(--surface); }
</style>
</head>
<body>
<div id="app">

  <!-- PAGE: AGENDA -->
  <div class="page active" id="page-agenda">
    <div class="header">
      <div class="header-top">
        <div class="app-title">mi <span class="title-lila">agenda</span></div>
        <div class="header-btns">
          <div class="today-badge" id="today-badge"></div>
          <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
        </div>
      </div>
      <div class="week-nav">
        <button onclick="changeWeek(-1)">‹</button>
        <span class="week-range" id="week-range"></span>
        <button onclick="changeWeek(1)">›</button>
      </div>
    </div>
    <div class="day-strip" id="day-strip"></div>
    <div class="content" id="main-content"></div>
  </div>

  <!-- PAGE: CATEGORY LIST -->
  <div class="page" id="page-catlist">
    <div class="header" style="padding-top:52px;padding-bottom:0">
      <div class="sub-header" style="padding:0 0 16px">
        <button class="back-btn" onclick="goPage('agenda')">‹</button>
        <div class="sub-header-title" id="catlist-title"></div>
      </div>
    </div>
    <div class="content" id="catlist-content"></div>
  </div>

  <!-- PAGE: CATEGORIAS -->
  <div class="page" id="page-cats">
    <div class="header" style="padding-top:52px">
      <div class="header-top"><div class="app-title">categorías</div></div>
    </div>
    <div class="page-content" id="cats-content"></div>
  </div>

  <!-- PAGE: STATS -->
  <div class="page" id="page-stats">
    <div class="header" style="padding-top:52px">
      <div class="header-top"><div class="app-title">resumen</div></div>
    </div>
    <div class="page-content" id="stats-content"></div>
  </div>

  <!-- PAGE: NOTAS -->
  <div class="page" id="page-notas">
    <div class="header" style="padding-top:52px">

</div>
<script>
const DAYS_ES=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DAYS_FULL=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const CAT_COLORS=['#a89ff4','#6dd5b0','#f4a0c0','#f4c07a','#7ac4f4','#c07af4','#f47a7a','#7af4c0','#f4e07a','#a0c4f4'];
const CAT_EMOJIS=['📚','🩺','🎙','💼','🧠','🎨','🏃','💊','✍️','🔬','📝','🌱','⚡','🎯','💡'];
const DEFAULT_CATS=[
  {id:'acad',name:'Académico',icon:'📚',color:'#a89ff4',hasSubs:true,subs:['Neuropsicología','Estadística','Psicología Clínica','Desarrollo Humano']},
  {id:'clin',name:'Clínico',icon:'🩺',color:'#6dd5b0',hasSubs:false,subs:[]},
  {id:'crea',name:'Creativo',icon:'🎙',color:'#f4a0c0',hasSubs:false,subs:[]},
];

let state=load();
let weekOffset=0;
let activeDayIdx=new Date().getDay()===0?6:new Date().getDay()-1;
let selCatId='',selSubVal='',detailId=null,editingId=null;
let currentPage='agenda',currentCatFilter=null;
let ceEditId=null,ceSelColor='',ceSelEmoji='',ceHasSubs=false;
let selRepeat='none';
let selWeekdays=[];
let repeatEndMode='forever';
const WEEKDAY_LABELS=['L','M','M','J','V','S','D']; // lun..dom display
function repeatLabel(r){ return {weekly:'Semanal',monthly:'Mensual',weekdays:'Días específicos'}[r] || ''; }

function load(){try{const s=localStorage.getItem('agenda_v3');if(s)return JSON.parse(s);}catch(e){}return{tasks:[],cats:JSON.parse(JSON.stringify(DEFAULT_CATS)),notes:[]};}
function save(){localStorage.setItem('agenda_v3',JSON.stringify(state));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function dateKey(d){return d.toISOString().slice(0,10);}
function getCat(id){return state.cats.find(c=>c.id===id);}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`;}
function catStyle(cat){const rgb=hexToRgb(cat.color);return{color:cat.color,bg:`rgba(${rgb},0.12)`,border:`rgba(${rgb},0.28)`};}
function getWeekStart(offset){const now=new Date(),day=now.getDay(),diff=day===0?-6:1-day,mon=new Date(now);mon.setDate(now.getDate()+diff+offset*7);mon.setHours(0,0,0,0);return mon;}
if(!state.notes) state.notes=[];

function goPage(p){
  currentPage=p;
  ['agenda','catlist','cats','stats','notas'].forEach(x=>document.getElementById('page-'+x).classList.toggle('active',x===p));
  ['agenda','cats','stats','notas'].forEach(x=>{const el=document.getElementById('nav-'+x);if(el)el.classList.toggle('active',x===p);});
  // show correct FAB
  const mainFab=document.getElementById('main-fab');
  const noteFab=document.getElementById('note-fab');
  if(mainFab) mainFab.style.display=(p==='agenda'||p==='catlist')?'flex':'none';
  if(noteFab) noteFab.style.display=p==='notas'?'flex':'none';
  if(p==='cats')renderCatsPage();
  if(p==='stats')renderStats();
  if(p==='agenda')renderAgenda();
  if(p==='notas')renderNotas();
}

function openCatList(catId){
  currentCatFilter=catId;
  const cat=getCat(catId);
  document.getElementById('catlist-title').textContent=cat?cat.icon+' '+cat.name:'';
  renderCatList();goPage('catlist');
}

// === AGENDA ===
function renderAgenda(){
  const ws=getWeekStart(weekOffset),we=new Date(ws);we.setDate(ws.getDate()+6);
  document.getElementById('week-range').textContent=ws.getDate()+' '+MONTHS[ws.getMonth()].slice(0,3)+' – '+we.getDate()+' '+MONTHS[we.getMonth()].slice(0,3);
  const today=new Date(),todayKey=dateKey(today);
  document.getElementById('today-badge').textContent=DAYS_FULL[today.getDay()]+', '+today.getDate()+' de '+MONTHS[today.getMonth()];
  document.getElementById('theme-btn').textContent=document.documentElement.classList.contains('light')?'☀️':'🌙';

  const strip=document.getElementById('day-strip');strip.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const dKey=dateKey(d);
    const hasTasks=state.tasks.some(t=>{
      if(t.date===dKey) return true;
      if(t.dateEnd&&t.date<=dKey&&t.dateEnd>=dKey) return true;
      return false;
    });
    const chip=document.createElement('div');
    chip.className='day-chip'+(i===activeDayIdx?' active':'')+(dKey===todayKey?' today':'')+(hasTasks?' has-tasks':'');
    chip.innerHTML=`<span class="day-name">${DAYS_ES[d.getDay()]}</span><span class="day-num">${d.getDate()}</span><span class="day-dot"></span>`;
    chip.onclick=()=>{activeDayIdx=i;renderAgenda();};strip.appendChild(chip);
  }

  const activeDate=new Date(ws);activeDate.setDate(ws.getDate()+activeDayIdx);
  const activeDKey=dateKey(activeDate);
  const dayTasks=state.tasks.filter(t=>{
    if(t.date===activeDKey) return true;
    if(t.dateEnd&&t.date<=activeDKey&&t.dateEnd>=activeDKey) return true;
    return false;
  }).sort((a,b)=>(a.start||'99:99').localeCompare(b.start||'99:99'));

  const content=document.getElementById('main-content');content.innerHTML='';

  const statsEl=document.createElement('div');statsEl.className='stats-row';
  const ws2=getWeekStart(weekOffset),we2=new Date(ws2);we2.setDate(ws2.getDate()+6);
  state.cats.forEach(cat=>{
    const cnt=state.tasks.filter(t=>{const td=new Date(t.date+'T12:00');return t.cat===cat.id&&td>=ws2&&td<=we2;}).length;
    const box=document.createElement('div');box.className='stat-box';box.style.cssText=`border-left:3px solid ${cat.color}`;
    box.innerHTML=`<div class="num" style="color:${cat.color}">${cnt}</div><div class="lbl">${cat.icon} ${cat.name}</div><div class="tap-hint">ver todas →</div>`;
    box.onclick=()=>openCatList(cat.id);statsEl.appendChild(box);
  });
  content.appendChild(statsEl);
  renderUpcoming(content);

  const lbl=document.createElement('div');lbl.className='day-label';
  lbl.textContent=DAYS_FULL[activeDate.getDay()]+' '+activeDate.getDate()+' de '+MONTHS[activeDate.getMonth()];
  content.appendChild(lbl);

  if(dayTasks.length===0){const e=document.createElement('div');e.className='empty-state';e.innerHTML='<div class="empty-icon">🌙</div><p>Sin actividades para este día</p>';content.appendChild(e);return;}
  const list=document.createElement('div');list.className='task-list';
  dayTasks.forEach(t=>list.appendChild(makeTaskCard(t)));content.appendChild(list);
}

function makeTaskCard(t){
  const cat=getCat(t.cat);
  const s=cat?catStyle(cat):{color:'#888',bg:'rgba(128,128,128,0.1)',border:'rgba(128,128,128,0.2)'};
  const card=document.createElement('div');card.className='task-card'+(t.done?' done':'');
  card.style.borderLeft=`3px solid ${s.color}`;
  const timeStr=t.start?(t.end?`${t.start} – ${t.end}`:t.start):'';
  const subLabel=t.sub||(cat?cat.name:'');
  const tagStyle=`background:${s.bg};color:${s.color};border-color:${s.border}`;
  const multiDayBadge=t.dateEnd?`<span class="repeat-badge">📆 varios días</span>`:'';
  const repeatBadge=t.repeat&&t.repeat!=='none'?`<span class="repeat-badge">🔁 ${repeatLabel(t.repeat)}</span>`:'';
  card.innerHTML=`
    <button class="task-check" style="${t.done?`border-color:${s.color};color:${s.color};background:${s.bg}`:''}" onclick="toggleDone('${t.id}',event)">${t.done?'✓':''}</button>
    <div class="task-body">
      <div class="task-title">${t.title}</div>
      <div class="task-meta">
        ${timeStr?`<span class="task-time">${timeStr}</span>`:''}
        <span class="task-tag" style="${tagStyle}">${cat?cat.icon:''} ${subLabel}</span>
        ${multiDayBadge}${repeatBadge}
      </div>
    </div>`;
  card.onclick=()=>openDetail(t.id);return card;
}

function changeWeek(dir){weekOffset+=dir;renderAgenda();}
function toggleDone(id,e){e.stopPropagation();const t=state.tasks.find(x=>x.id===id);if(t){t.done=!t.done;save();renderAgenda();if(currentPage==='catlist')renderCatList();}}

// === UPCOMING ===
function renderUpcoming(content){
  const today=new Date();today.setHours(0,0,0,0);
  const upcoming=state.tasks
    .filter(t=>{if(t.done)return false;const td=new Date(t.date+'T12:00');td.setHours(0,0,0,0);const d=Math.round((td-today)/86400000);return d>=0&&d<=7;})
    .map(t=>{const td=new Date(t.date+'T12:00');td.setHours(0,0,0,0);return{...t,diff:Math.round((td-today)/86400000)};})
    .sort((a,b)=>a.diff-b.diff);
  if(upcoming.length===0)return;
  const section=document.createElement('div');section.className='upcoming-section';
  section.innerHTML=`<div class="upcoming-header"><span style="font-size:16px">⚡</span><span class="up-title">Próximas entregas</span></div>`;
  upcoming.forEach(t=>{
    const cat=getCat(t.cat);
    const s=cat?catStyle(cat):{color:'#888',bg:'rgba(128,128,128,0.1)',border:'rgba(128,128,128,0.2)'};
    const urgency=t.diff<=2?'urgent':t.diff<=4?'soon':'';
    const dayLabel=t.diff===0?'hoy':t.diff===1?'mañana':`en ${t.diff} días`;
    const subLabel=t.sub||(cat?cat.name:'');
    const tagStyle=`background:${s.bg};color:${s.color};border-color:${s.border}`;
    const card=document.createElement('div');card.className=`upcoming-card ${urgency}`;
    card.innerHTML=`
      <div class="up-days">${dayLabel}</div>
      <div class="up-body"><div class="up-name">${t.title}</div><div class="up-sub">${subLabel}</div></div>
      <span class="task-tag" style="${tagStyle};flex-shrink:0">${cat?cat.icon:''}</span>
      <button class="up-check" onclick="checkUpcoming('${t.id}',event)">✓</button>`;
    card.onclick=()=>openDetail(t.id);section.appendChild(card);
  });
  content.insertBefore(section,content.firstChild);
}

function checkUpcoming(id,e){e.stopPropagation();const t=state.tasks.find(x=>x.id===id);if(t){t.done=true;save();renderAgenda();}}

// === CAT LIST ===
function renderCatList(){
  const el=document.getElementById('catlist-content');el.innerHTML='';
  const tasks=state.tasks.filter(t=>t.cat===currentCatFilter).sort((a,b)=>a.date.localeCompare(b.date)||(a.start||'').localeCompare(b.start||''));
  if(tasks.length===0){el.innerHTML='<div class="empty-state"><div class="empty-icon">🌿</div><p>Sin actividades en esta categoría</p></div>';return;}
  const groups={};
  tasks.forEach(t=>{const d=new Date(t.date+'T12:00'),k=MONTHS[d.getMonth()]+' '+d.getFullYear();if(!groups[k])groups[k]=[];groups[k].push(t);});
  const list=document.createElement('div');list.className='task-list';
  Object.entries(groups).forEach(([month,ts])=>{const g=document.createElement('div');g.className='task-date-group';g.textContent=month;list.appendChild(g);ts.forEach(t=>list.appendChild(makeTaskCard(t)));});
  el.appendChild(list);
}

// === ADD / EDIT ===
function openAdd(){
  editingId=null;selCatId='';selSubVal='';selRepeat='none';selWeekdays=[];repeatEndMode='forever';
  document.getElementById('add-modal-title').textContent='Nueva actividad';
  document.getElementById('f-title').value='';
  document.getElementById('f-note').value='';
  document.getElementById('f-start').value='';
  document.getElementById('f-end').value='';
  document.getElementById('f-date-end').value='';
  document.getElementById('f-repeat-until').value='';
  document.getElementById('f-repeat-until').style.display='none';
  document.getElementById('materia-field').style.display='none';
  renderCatChips();
  renderRepeatChips();
  const ws=getWeekStart(weekOffset),ad=new Date(ws);ad.setDate(ws.getDate()+activeDayIdx);
  document.getElementById('f-date').value=dateKey(ad);
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),300);
}

function openEdit(){
  const t=state.tasks.find(x=>x.id===detailId);if(!t)return;
  editingId=t.id;closeDetail();
  document.getElementById('add-modal-title').textContent='Editar actividad';
  document.getElementById('f-title').value=t.title;
  document.getElementById('f-date').value=t.date;
  document.getElementById('f-date-end').value=t.dateEnd||'';
  document.getElementById('f-start').value=t.start||'';
  document.getElementById('f-end').value=t.end||'';
  document.getElementById('f-note').value=t.note||'';
  selRepeat=t.repeat||'none';
  selWeekdays=t.repeatWeekdays?[...t.repeatWeekdays]:[];
  repeatEndMode=t.repeatUntil?'until':'forever';
  document.getElementById('f-repeat-until').value=t.repeatUntil||'';
  renderRepeatChips();
  selCatId=t.cat;selSubVal=t.sub||'';
  renderCatChips();
  const cat=getCat(t.cat);
  if(cat&&cat.hasSubs){document.getElementById('materia-field').style.display='';renderMateriaChips(cat);}
  else{document.getElementById('materia-field').style.display='none';}
  document.getElementById('add-modal').classList.add('open');
}

function renderRepeatChips(){
  const wrap=document.getElementById('repeat-chips');wrap.innerHTML='';
  const opts=[['none','Solo una vez'],['weekly','Cada semana'],['monthly','Cada mes'],['weekdays','Días específicos']];
  opts.forEach(([id,label])=>{
    const btn=document.createElement('button');
    btn.className='repeat-chip'+(selRepeat===id?' sel':'');
    btn.textContent=label;
    btn.onclick=()=>selectRepeat(id);
    wrap.appendChild(btn);
  });
  document.getElementById('weekday-field').style.display=selRepeat==='weekdays'?'':'none';
  document.getElementById('repeat-end-row').style.display=selRepeat!=='none'?'':'none';
  if(selRepeat==='weekdays') renderWeekdayRow();
  if(selRepeat!=='none') renderRepeatEndOpts();
}

function selectRepeat(id){
  selRepeat=id;
  if(id!=='weekdays') selWeekdays=[];
  renderRepeatChips();
}

function renderWeekdayRow(){
  const wrap=document.getElementById('weekday-row');wrap.innerHTML='';
  DAYS_ES.forEach((d,i)=>{
    // i: 0=Dom..6=Sab -> convert to mon-first index for matching JS getDay() later; store JS getDay() values directly
    const btn=document.createElement('button');
    btn.className='weekday-opt'+(selWeekdays.includes(i)?' sel':'');
    btn.textContent=d.slice(0,1);
    btn.onclick=()=>{ if(selWeekdays.includes(i)) selWeekdays=selWeekdays.filter(x=>x!==i); else selWeekdays.push(i); renderWeekdayRow(); };
    wrap.appendChild(btn);
  });
}

function renderRepeatEndOpts(){
  document.getElementById('rend-forever').className='repeat-chip'+(repeatEndMode==='forever'?' sel':'');
  document.getElementById('rend-until').className='repeat-chip'+(repeatEndMode==='until'?' sel':'');
  document.getElementById('f-repeat-until').style.display=repeatEndMode==='until'?'':'none';
}

function setRepeatEndMode(m){ repeatEndMode=m; renderRepeatEndOpts(); }

function renderCatChips(){
  const wrap=document.getElementById('f-cat-chips');wrap.innerHTML='';
  state.cats.forEach(cat=>{
    const s=catStyle(cat);const btn=document.createElement('button');
    btn.className='cat-chip-opt'+(selCatId===cat.id?' selected':'');

function selCat(id){
  selCatId=id;selSubVal='';renderCatChips();

  if(cat&&cat.hasSubs){document.getElementById('materia-field').style.display='';renderMateriaChips(cat);}

function renderMateriaChips(cat){
  const wrap=document.getElementById('materia-chips');wrap.innerHTML='';
  (cat.subs||[]).forEach(m=>{const chip=document.createElement('button');chip.className='materia-chip'+(m===selSubVal?' sel':'');chip.textContent=m;chip.onclick=()=>{selSubVal=m;renderMateriaChips(cat);};wrap.appendChild(chip);});

function closeAdd(){document.getElementById('add-modal').classList.remove('open');editingId=null;}
function closeAddOnBg(e){if(e.target.id==='add-modal')closeAdd();}

function generateOccurrenceDates(startDateStr, repeat, weekdays, untilStr){
  const dates=[startDateStr];
  if(repeat==='none') return dates;
  const start=new Date(startDateStr+'T12:00');
  const horizonLimit=new Date(start); horizonLimit.setFullYear(horizonLimit.getFullYear()+2); // safety cap: 2 years out
  const until = untilStr ? new Date(untilStr+'T12:00') : horizonLimit;
  const cap = until < horizonLimit ? until : horizonLimit;

  if(repeat==='weekly'){
    let d=new Date(start);
    while(true){
      d=new Date(d); d.setDate(d.getDate()+7);
      if(d>cap) break;
      dates.push(dateKey(d));
    }
  } else if(repeat==='monthly'){
    let d=new Date(start);
    while(true){
      d=new Date(d); d.setMonth(d.getMonth()+1);
      if(d>cap) break;
      dates.push(dateKey(d));
    }
  } else if(repeat==='weekdays'){
    if(weekdays&&weekdays.length>0){
      let d=new Date(start); d.setDate(d.getDate()+1);
      while(d<=cap){
        if(weekdays.includes(d.getDay())) dates.push(dateKey(d));
        d=new Date(d); d.setDate(d.getDate()+1);
      }
    }
  }
  return dates;
}

function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  if(!selCatId)return;
  const baseDate=document.getElementById('f-date').value;
  const dateEnd=document.getElementById('f-date-end').value;
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value;
  const note=document.getElementById('f-note').value.trim();
  const untilVal=repeatEndMode==='until'?document.getElementById('f-repeat-until').value:'';

  if(editingId){
    const t=state.tasks.find(x=>x.id===editingId);
    if(t){
      t.title=title;t.cat=selCatId;t.date=baseDate;t.dateEnd=dateEnd;t.start=start;t.end=end;t.note=note;t.sub=selSubVal;
      t.repeat=selRepeat;t.repeatWeekdays=selRepeat==='weekdays'?[...selWeekdays]:[];t.repeatUntil=untilVal;
    }
  } else {
    const groupId=uid();
    const dates=generateOccurrenceDates(baseDate, selRepeat, selWeekdays, untilVal);
    dates.forEach(d=>{
      state.tasks.push({
        id:uid(), groupId, title, cat:selCatId, date:d, dateEnd, start, end, note, sub:selSubVal,
        repeat:selRepeat, repeatWeekdays:selRepeat==='weekdays'?[...selWeekdays]:[], repeatUntil:untilVal,
        done:false, created:Date.now()
      });
    });
  }
  save();closeAdd();renderAgenda();if(currentPage==='catlist')renderCatList();
}

// === DETAIL ===
function openDetail(id){
  detailId=id;const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const cat=getCat(t.cat);const s=cat?catStyle(cat):{color:'#888',bg:'rgba(128,128,128,0.1)',border:'rgba(128,128,128,0.2)'};
  document.getElementById('d-title').textContent=t.title;
  const d=new Date(t.date+'T12:00');
  document.getElementById('d-date').textContent=(t.dateEnd?'Inicio: ':'')+DAYS_FULL[d.getDay()]+', '+d.getDate()+' de '+MONTHS[d.getMonth()];
  const der=document.getElementById('d-date-end-row');
  if(t.dateEnd){
    const de=new Date(t.dateEnd+'T12:00');
    der.style.display='flex';
    document.getElementById('d-date-end').textContent='Término: '+DAYS_FULL[de.getDay()]+', '+de.getDate()+' de '+MONTHS[de.getMonth()];
  } else { der.style.display='none'; }
  document.getElementById('d-tag-row').innerHTML=`<span class="task-tag" style="background:${s.bg};color:${s.color};border-color:${s.border}">${cat?cat.icon:''} ${cat?cat.name:''}</span>`;
  const tr=document.getElementById('d-time-row');
  if(t.start){tr.style.display='flex';document.getElementById('d-time').textContent=t.end?`${t.start} – ${t.end}`:t.start;}else{tr.style.display='none';}
  const rr=document.getElementById('d-repeat-row');
  if(t.repeat&&t.repeat!=='none'){
    rr.style.display='flex';
    let txt=repeatLabel(t.repeat);
    if(t.repeat==='weekdays'&&t.repeatWeekdays&&t.repeatWeekdays.length){
      txt+=': '+t.repeatWeekdays.sort().map(i=>DAYS_ES[i]).join(', ');
    }
    if(t.repeatUntil){ const ud=new Date(t.repeatUntil+'T12:00'); txt+=' · hasta '+ud.getDate()+' '+MONTHS[ud.getMonth()].slice(0,3); }
    else { txt+=' · sin fecha límite'; }
    document.getElementById('d-repeat').textContent=txt;
  } else { rr.style.display='none'; }
  const mr=document.getElementById('d-materia-row');
  if(t.sub){mr.style.display='flex';document.getElementById('d-materia').textContent=t.sub;}else{mr.style.display='none';}
  const nw=document.getElementById('d-note-wrap');
  if(t.note){nw.style.display='';document.getElementById('d-note').textContent=t.note;}else{nw.style.display='none';}
  document.getElementById('detail-modal').classList.add('open');
}
function closeDetail(){document.getElementById('detail-modal').classList.remove('open');}
function closeDetailOnBg(e){if(e.target.id==='detail-modal')closeDetail();}
function deleteTask(){
  const t=state.tasks.find(x=>x.id===detailId);
  if(t&&t.groupId&&t.repeat&&t.repeat!=='none'){
    const deleteAll=confirm('Esta actividad se repite. ¿Quieres eliminar TODAS las repeticiones? (Cancelar = solo elimina esta fecha)');
    if(deleteAll){ state.tasks=state.tasks.filter(x=>x.groupId!==t.groupId); }
    else { state.tasks=state.tasks.filter(x=>x.id!==detailId); }
  } else {
    state.tasks=state.tasks.filter(x=>x.id!==detailId);
  }
  save();closeDetail();renderAgenda();if(currentPage==='catlist')renderCatList();
}

// === SUBCATEGORIAS ===
function openMatModal(fromAdd){document.getElementById('m-name').value='';document.getElementById('materia-modal').classList.add('open');document.getElementById('materia-modal').dataset.fromAdd=fromAdd?'1':'';setTimeout(()=>document.getElementById('m-name').focus(),300);}
function closeMatModal(e){if(e.type==='click'&&e.target.id!=='materia-modal')return;document.getElementById('materia-modal').classList.remove('open');}
function saveMateria(){
  const name=document.getElementById('m-name').value.trim();if(!name)return;
  const cat=getCat(selCatId);if(!cat)return;
  if(!cat.subs)cat.subs=[];
  if(!cat.subs.includes(name)){cat.subs.push(name);save();}
  document.getElementById('materia-modal').classList.remove('open');
  if(document.getElementById('materia-modal').dataset.fromAdd==='1'){selSubVal=name;document.getElementById('add-modal').classList.add('open');selCat(selCatId);}
  else{renderCatsPage();}
}

// === CATEGORIAS PAGE ===
function renderCatsPage(){
  const el=document.getElementById('cats-content');el.innerHTML='';
  const lbl=document.createElement('div');lbl.className='section-label';lbl.textContent='Mis categorías';el.appendChild(lbl);
  state.cats.forEach((cat)=>{
    const row=document.createElement('div');row.className='list-row';
    const cnt=state.tasks.filter(t=>t.cat===cat.id).length;
    row.innerHTML=`<div class="r-main"><div class="r-name"><span class="cat-dot" style="background:${cat.color}"></span>${cat.icon} ${cat.name}</div><div class="r-sub">${cnt} actividad${cnt!==1?'es':''}</div></div><button class="r-edit" onclick="openCatEdit('${cat.id}')">✏️</button><button class="r-del" onclick="deleteCat('${cat.id}')">×</button>`;
    el.appendChild(row);
    if(cat.hasSubs&&cat.subs&&cat.subs.length>0){
      const sl=document.createElement('div');sl.className='section-label';sl.style.cssText='margin-top:12px;margin-left:12px';sl.textContent='Subcategorías';el.appendChild(sl);
      cat.subs.forEach((sub,si)=>{
        const sr=document.createElement('div');sr.className='list-row';sr.style.marginLeft='12px';
        const sc=state.tasks.filter(t=>t.cat===cat.id&&t.sub===sub).length;
        sr.innerHTML=`<div class="r-main"><div class="r-name">${sub}</div><div class="r-sub">${sc} actividad${sc!==1?'es':''}</div></div><button class="r-del" onclick="deleteSub('${cat.id}',${si})">×</button>`;
        el.appendChild(sr);
      });
      const addS=document.createElement('button');addS.className='add-row-btn';addS.style.marginLeft='12px';addS.textContent='+ Agregar subcategoría';addS.onclick=()=>{selCatId=cat.id;openMatModal(false);};el.appendChild(addS);
    }
  });
  const addC=document.createElement('button');addC.className='add-row-btn';addC.textContent='+ Nueva categoría';addC.onclick=()=>openCatEdit(null);el.appendChild(addC);
}

function deleteCat(id){if(state.cats.length<=1)return;state.cats=state.cats.filter(c=>c.id!==id);state.tasks=state.tasks.filter(t=>t.cat!==id);save();renderCatsPage();}
function deleteSub(catId,idx){const cat=getCat(catId);if(!cat)return;cat.subs.splice(idx,1);save();renderCatsPage();}

function openCatEdit(id){
  ceEditId=id;const cat=id?getCat(id):null;
  document.getElementById('cat-edit-title').textContent=cat?'Editar categoría':'Nueva categoría';
  document.getElementById('ce-name').value=cat?cat.name:'';
  ceSelColor=cat?cat.color:CAT_COLORS[0];ceSelEmoji=cat?cat.icon:CAT_EMOJIS[0];ceHasSubs=cat?!!cat.hasSubs:false;
  const cg=document.getElementById('ce-color-grid');cg.innerHTML='';
  CAT_COLORS.forEach(c=>{const sw=document.createElement('div');sw.className='color-swatch'+(c===ceSelColor?' sel':'');sw.style.background=c;sw.onclick=()=>{ceSelColor=c;cg.querySelectorAll('.color-swatch').forEach((s,i)=>s.classList.toggle('sel',CAT_COLORS[i]===ceSelColor));};cg.appendChild(sw);});
  const eg=document.getElementById('ce-emoji-grid');eg.innerHTML='';
  CAT_EMOJIS.forEach(em=>{const opt=document.createElement('button');opt.className='emoji-opt'+(em===ceSelEmoji?' sel':'');opt.textContent=em;opt.onclick=()=>{ceSelEmoji=em;eg.querySelectorAll('.emoji-opt').forEach(o=>o.classList.toggle('sel',o.textContent===ceSelEmoji));};eg.appendChild(opt);});
  setCeSub(ceHasSubs);document.getElementById('cat-edit-modal').classList.add('open');
}
function setCeSub(val){ceHasSubs=val;document.getElementById('ce-sub-yes').className='cat-chip-opt'+(val?' selected':'');document.getElementById('ce-sub-no').className='cat-chip-opt'+(!val?' selected':'');}
function closeCatEditOnBg(e){if(e.target.id==='cat-edit-modal')document.getElementById('cat-edit-modal').classList.remove('open');}
function saveCatEdit(){
  const name=document.getElementById('ce-name').value.trim();if(!name)return;
  if(ceEditId){const cat=getCat(ceEditId);if(cat){cat.name=name;cat.color=ceSelColor;cat.icon=ceSelEmoji;cat.hasSubs=ceHasSubs;if(ceHasSubs&&!cat.subs)cat.subs=[];}}
  else{state.cats.push({id:uid(),name,icon:ceSelEmoji,color:ceSelColor,hasSubs:ceHasSubs,subs:[]});}
  save();document.getElementById('cat-edit-modal').classList.remove('open');renderCatsPage();
}

// === STATS ===
function renderStats(){
  const el=document.getElementById('stats-content');
  const total=state.tasks.length,done=state.tasks.filter(t=>t.done).length;
  let html=`<div class="section-label">Total acumulado</div><div class="stats-row">`;
  state.cats.forEach(cat=>{const cnt=state.tasks.filter(t=>t.cat===cat.id).length;html+=`<div class="stat-box" style="border-left:3px solid ${cat.color}" onclick="openCatList('${cat.id}')"><div class="num" style="color:${cat.color}">${cnt}</div><div class="lbl">${cat.icon} ${cat.name}</div></div>`;});
  html+=`</div><div class="section-label" style="margin-top:20px">Progreso general</div><div style="background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border);margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:13px;color:var(--text2)">Completadas</span><span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--text)">${done} / ${total}</span></div><div style="background:var(--border2);border-radius:4px;height:6px;overflow:hidden"><div style="background:var(--text);height:100%;width:${total>0?Math.round(done/total*100):0}%;border-radius:4px"></div></div></div>`;
  const cws=state.cats.filter(c=>c.hasSubs&&c.subs&&c.subs.length>0);
  if(cws.length>0){html+=`<div class="section-label" style="margin-top:20px">Por subcategoría</div>`;cws.forEach(cat=>{cat.subs.forEach(sub=>{const cnt=state.tasks.filter(t=>t.cat===cat.id&&t.sub===sub).length,dc=state.tasks.filter(t=>t.cat===cat.id&&t.sub===sub&&t.done).length;html+=`<div style="background:var(--surface);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--border);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:14px">${cat.icon} ${sub}</span><span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text3)">${dc}/${cnt}</span></div>`;});});}
  el.innerHTML=html;
}

// === THEME ===
function toggleTheme(){const l=document.documentElement.classList.toggle('light');document.getElementById('theme-btn').textContent=l?'☀️':'🌙';localStorage.setItem('agenda_theme',l?'light':'dark');}
if(localStorage.getItem('agenda_theme')==='light')document.documentElement.classList.add('light');

// === NOTAS ===
const NOTE_COLORS=['#ffd97d','#a8dadc','#caffbf','#ffc8dd','#bde0fe','#e9c46a','#c8b6ff','#fdffb6','#b7e4c7','#ffb3c1'];
let selNoteColor=NOTE_COLORS[0];
let noteEditId=null;
let noteDetailId=null;

function renderNotas(){
  const el=document.getElementById('notas-content');el.innerHTML='';
  if(!state.notes||state.notes.length===0){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📝</div><p>Sin notas todavía<br>Toca + para agregar una</p></div>';
    return;
  }
  // group by tag
  const tags=[...new Set(state.notes.map(n=>n.tag||'Sin etiqueta'))];
  tags.forEach(tag=>{
    const tagNotes=state.notes.filter(n=>(n.tag||'Sin etiqueta')===tag).sort((a,b)=>b.created-a.created);
    const lbl=document.createElement('div');lbl.className='section-label';lbl.textContent=tag;el.appendChild(lbl);
    const grid=document.createElement('div');grid.className='notes-grid';
    tagNotes.forEach(n=>{
      const card=document.createElement('div');card.className='note-card';card.style.background=n.color||NOTE_COLORS[0];
      const d=new Date(n.created);
      const dateStr=d.getDate()+' '+MONTHS[d.getMonth()].slice(0,3);
      card.innerHTML=`<div><div class="n-title">${n.title}</div><div class="n-body">${n.body||''}</div></div><div class="n-footer"><span class="n-tag">${n.tag||''}</span><span class="n-date">${dateStr}</span></div>`;
      card.onclick=()=>openNoteDetail(n.id);
      grid.appendChild(card);
    });
    el.appendChild(grid);
  });
}

function openNoteAdd(){
  noteEditId=null;selNoteColor=NOTE_COLORS[0];
  document.getElementById('note-modal-title').textContent='Nueva nota';
  document.getElementById('fn-title').value='';
  document.getElementById('fn-body').value='';
  document.getElementById('fn-tag').value='';
  renderNoteColors();
  document.getElementById('note-modal').classList.add('open');
  setTimeout(()=>document.getElementById('fn-title').focus(),300);
}

function openNoteEdit(){
  const n=state.notes.find(x=>x.id===noteDetailId);if(!n)return;
  noteEditId=n.id;closeNoteDetail();
  document.getElementById('note-modal-title').textContent='Editar nota';
  document.getElementById('fn-title').value=n.title;
  document.getElementById('fn-body').value=n.body||'';
  document.getElementById('fn-tag').value=n.tag||'';
  selNoteColor=n.color||NOTE_COLORS[0];
  renderNoteColors();
  document.getElementById('note-modal').classList.add('open');
}

function renderNoteColors(){
  const wrap=document.getElementById('fn-colors');wrap.innerHTML='';
  NOTE_COLORS.forEach(c=>{
    const sw=document.createElement('div');sw.className='note-color-sw'+(c===selNoteColor?' sel':'');
    sw.style.background=c;
    sw.onclick=()=>{selNoteColor=c;renderNoteColors();};
    wrap.appendChild(sw);
  });
}

function saveNote(){
  const title=document.getElementById('fn-title').value.trim();
  if(!title){document.getElementById('fn-title').focus();return;}
  if(noteEditId){
    const n=state.notes.find(x=>x.id===noteEditId);
    if(n){n.title=title;n.body=document.getElementById('fn-body').value.trim();n.tag=document.getElementById('fn-tag').value.trim();n.color=selNoteColor;}
  } else {
    state.notes.push({id:uid(),title,body:document.getElementById('fn-body').value.trim(),tag:document.getElementById('fn-tag').value.trim(),color:selNoteColor,created:Date.now()});
  }
  save();document.getElementById('note-modal').classList.remove('open');renderNotas();
}

function closeNoteModalOnBg(e){if(e.target.id==='note-modal')document.getElementById('note-modal').classList.remove('open');}

function openNoteDetail(id){
  noteDetailId=id;const n=state.notes.find(x=>x.id===id);if(!n)return;
  document.getElementById('nd-title').textContent=n.title;
  document.getElementById('nd-body').textContent=n.body||'';
  document.getElementById('nd-tag-row').innerHTML=n.tag?`<span class="task-tag" style="background:rgba(0,0,0,0.1);color:#1e1a2e;border-color:rgba(0,0,0,0.15)">${n.tag}</span>`:'';
  const d=new Date(n.created);
  document.getElementById('nd-date').textContent=DAYS_FULL[d.getDay()]+', '+d.getDate()+' de '+MONTHS[d.getMonth()];
  document.getElementById('note-detail-modal').classList.add('open');
}
function closeNoteDetail(){document.getElementById('note-detail-modal').classList.remove('open');}
function closeNoteDetailOnBg(e){if(e.target.id==='note-detail-modal')closeNoteDetail();}
function deleteNote(){state.notes=state.notes.filter(n=>n.id!==noteDetailId);save();closeNoteDetail();renderNotas();}

// Init
renderAgenda();

  const sw=`self.addEventListener('install',e=>e.waitUntil(caches.open('agenda-v3').then(c=>c.addAll(['./','./index.html','./manifest.json']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
